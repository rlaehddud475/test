<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAVA 중간고사 주관식 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Fira+Code:wght@400&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .code-font { font-family: 'Fira Code', monospace; background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
        .hidden { display: none; }
        .quiz-card { width: 100%; max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        @media (min-width: 640px) { .quiz-card { min-height: auto; margin-top: 2rem; margin-bottom: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="quiz-card shadow-lg">
        <!-- 시작 화면 -->
        <div id="setup-screen" class="p-10 text-center">
            <h1 class="text-3xl font-black text-slate-800 mb-4">JAVA 주관식 마스터</h1>
            <p class="text-slate-500 mb-8 text-sm">2~4장 기초 문법, 제어문, 객체 지향<br>총 400+ 문항 풀에서 랜덤 10문제 추출</p>
            <button onclick="startQuiz()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition-all">학습 시작하기</button>
        </div>

        <!-- 퀴즈 화면 -->
        <div id="quiz-screen" class="hidden flex flex-col flex-grow">
            <div class="h-1.5 w-full bg-slate-100"><div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div></div>
            <div class="px-6 py-4 flex justify-between items-center border-b border-slate-100">
                <span class="text-[10px] font-black tracking-widest bg-blue-100 text-blue-700 px-2 py-0.5 rounded uppercase">JAVA</span>
                <span id="progress-text" class="text-xs font-bold text-slate-400">01 / 10</span>
                <button onclick="location.reload()" class="text-slate-400">✕</button>
            </div>
            <div class="p-6 flex-grow overflow-y-auto">
                <h2 id="q-text" class="text-lg font-bold text-slate-800 leading-snug mb-4"></h2>
                <div id="code-area" class="code-font hidden"></div>
                <input type="text" id="ans-input" autocomplete="off" placeholder="정답 입력" class="w-full p-4 border-2 border-slate-200 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div class="p-6 bg-white border-t border-slate-100">
                <button onclick="handleNext()" id="action-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">다음 문제</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden p-6 flex-grow overflow-y-auto">
            <div class="text-center mb-8"><h2 class="text-2xl font-black text-slate-800">결과 리포트</h2><div class="text-4xl font-black text-blue-600 my-4" id="score-display">0 / 10</div></div>
            <div id="review-list" class="space-y-4 mb-20"></div>
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100 max-w-[600px] mx-auto flex gap-3">
                <button onclick="location.reload()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold">홈으로</button>
                <button onclick="startQuiz()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg">다시 풀기(새 문제)</button>
            </div>
        </div>
    </div>

    <script>
        const javaBank = [
            { q: "객체를 생성할 때 사용하는 연산자는?", a: "new", r: "new 연산자는 힙 영역에 메모리를 할당합니다." },
            { q: "실행 결과는 무엇인가?", c: "int a = 10; \nint b = a++; \nSystem.out.println(b);", a: "10", r: "후위 증가 연산자는 대입 후에 값이 증가합니다." },
            { q: "객체 자신을 가리키는 키워드는?", a: "this", r: "현재 인스턴스의 참조값을 가집니다." },
            { q: "다른 생성자를 호출할 때 사용하는 키워드는?", a: "this()", r: "생성자 첫 줄에서만 사용 가능합니다." },
            { q: "실행 결과는 무엇인가?", c: "System.out.println(10 % 3);", a: "1", r: "% 연산자는 나머지를 구합니다." },
            { q: "모든 클래스의 최상위 부모 클래스는?", a: "Object", r: "자바의 모든 클래스는 Object를 상속받습니다." },
            { q: "자료형 변환 중 작은 타입을 큰 타입으로 넣는 것은?", a: "자동 형변환", r: "데이터 손실이 없으므로 자동으로 이루어집니다." },
            { q: "인스턴스 생성 없이 사용할 수 있는 멤버 키워드는?", a: "static", r: "정적 멤버는 클래스 로더가 로드될 때 생성됩니다." },
            { q: "논리 연산자 중 AND를 의미하는 기호는?", a: "&&", r: "두 조건이 모두 참이어야 합니다." },
            { q: "상수를 선언할 때 사용하는 키워드는?", a: "final", r: "값의 변경이 불가능하도록 설정합니다." },
        ];

        let currentIdx = 0, score = 0, quizPool = [], userAnswers = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            currentIdx = 0; score = 0; userAnswers = [];
            quizPool = shuffle([...javaBank]).slice(0, 10);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = quizPool[currentIdx];
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 10) * 100}%`;
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / 10`;
            document.getElementById('q-text').innerText = q.q;
            
            const area = document.getElementById('code-area');
            if(q.c) { area.innerText = q.c; area.classList.remove('hidden'); }
            else { area.classList.add('hidden'); }
            
            document.getElementById('ans-input').value = "";
            document.getElementById('ans-input').focus();
        }

        function handleNext() {
            const userAns = document.getElementById('ans-input').value.trim();
            const correct = quizPool[currentIdx].a;
            const isCorrect = userAns.replace(/\s/g,"") === correct.replace(/\s/g,"");
            if(isCorrect) score++;
            userAnswers.push({ q: quizPool[currentIdx].q, u: userAns, a: correct, r: quizPool[currentIdx].r, is: isCorrect, c: quizPool[currentIdx].c });

            if(currentIdx < 9) { currentIdx++; showQuestion(); }
            else { finish(); }
        }

        function finish() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} / 10`;
            const list = document.getElementById('review-list');
            list.innerHTML = userAnswers.map((item, i) => `
                <div class="p-4 rounded-xl border-2 ${item.is ? 'border-slate-100' : 'border-red-100 bg-red-50'} animate-slide-up">
                    <p class="font-bold text-slate-800 mb-2">${i+1}. ${item.q}</p>
                    ${item.c ? `<div class="bg-slate-100 p-2 rounded text-xs mb-2 font-mono whitespace-pre">${item.c}</div>` : ''}
                    <div class="text-sm">
                        <p class="${item.is ? 'text-blue-600' : 'text-red-600'}">내 답변: ${item.u || '(미입력)'}</p>
                        <p class="text-blue-700 font-bold">정답: ${item.a}</p>
                        <p class="text-slate-500 mt-1 text-xs">💡 ${item.r}</p>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('ans-input').onkeypress = (e) => { if(e.key === 'Enter') handleNext(); };
    </script>
</body>
</html>
