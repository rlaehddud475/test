<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAVA 중간고사 주관식 마스터 (30제)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; touch-action: manipulation; }
        .code-font { font-family: 'Fira Code', monospace; background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.75rem; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; margin-bottom: 1rem; }
        .hidden { display: none !important; }
        .quiz-card { width: 100%; max-width: 500px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; position: relative; }
        @media (min-width: 640px) { .quiz-card { height: 90vh; margin-top: 5vh; border-radius: 2rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); } }
        .progress-bar { transition: width 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.3s ease forwards; }
        input:focus { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-200 flex items-center justify-center">
    <div class="quiz-card overflow-hidden">
        <div id="setup-screen" class="p-8 text-center flex flex-col justify-center items-center h-full">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-blue-200">
                <span class="text-white text-4xl font-black">J</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-2">JAVA 주관식 30제</h1>
            <p class="text-slate-500 mb-10 text-sm leading-relaxed break-keep">
                한빛아카데미 1~4장 종합 문제 은행<br>
                재도전 시 30문제 중 랜덤 10문제가 출제됩니다!
            </p>
            <button onclick="startQuiz()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                학습 시작하기
            </button>
        </div>

        <div id="quiz-screen" class="hidden flex flex-col h-full">
            <div class="h-1.5 w-full bg-slate-100"><div id="progress-bar" class="h-full bg-blue-500 w-0"></div></div>
            <div class="px-6 py-4 flex justify-between items-center border-b">
                <span id="progress-text" class="text-xs font-bold text-slate-400 tracking-widest uppercase">01 / 10</span>
                <button onclick="location.reload()" class="text-slate-300">✕</button>
            </div>
            <div class="flex-grow px-6 py-6 overflow-y-auto">
                <div id="q-container" class="animate-in">
                    <h2 id="q-text" class="text-lg font-bold text-slate-800 mb-4 leading-snug break-keep"></h2>
                    <div id="code-area" class="code-font hidden"></div>
                    <div class="space-y-2 mt-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">정답 입력</label>
                        <input type="text" id="ans-input" autocomplete="off" placeholder="정답을 입력하세요" 
                               class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 focus:bg-white transition-all font-bold">
                    </div>
                </div>
            </div>
            <div class="p-6 bg-white border-t">
                <button onclick="handleNext()" id="action-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                    다음 문제
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden flex flex-col h-full bg-white">
            <div class="p-6 overflow-y-auto flex-grow pb-24">
                <div class="text-center my-8">
                    <h2 class="text-2xl font-black text-slate-800 mb-2">결과 리포트</h2>
                    <div class="text-5xl font-black text-blue-600 mb-2" id="score-display">0 / 10</div>
                </div>
                <div id="review-list" class="space-y-4"></div>
            </div>
            <div class="absolute bottom-0 left-0 right-0 p-6 bg-white border-t flex gap-2">
                <button onclick="location.reload()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold">홈으로</button>
                <button onclick="startQuiz()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg">다시 풀기</button>
            </div>
        </div>
    </div>

    <script>
        const javaBank = [
            // 1~2장: 기초 및 구조
            { q: "자바 소스 파일(.java)을 컴파일하면 생성되는 파일의 확장자는?", a: "class", r: "p.75 1번" },
            { q: "자바 프로그램의 실행 시작점이 되는 메서드의 이름은?", a: "main", r: "p.76 2번" },
            { q: "자바 예약어가 아니어서 변수명으로 사용할 수 있는 것은?", a: "result", r: "p.78 14번" },
            { q: "2진수 00101100을 10진수로 변환하면?", a: "44", r: "p.79 16번" },
            { q: "다음 코드의 출력 결과는?", c: "int x=1; int a=x++;\nSystem.out.println(a);", a: "1", r: "p.81 07번" },
            { q: "한 번 정해지면 값을 바꿀 수 없는 변수를 만들 때 쓰는 키워드는?", a: "final", r: "상수 선언 키워드입니다." },
            { q: "나머지를 구하는 산술 연산자 기호는?", a: "%", r: "나머지 연산자입니다." },
            { q: "정수 타입 중 8바이트 크기를 가지는 타입은?", a: "long", r: "int는 4바이트, long은 8바이트입니다." },
            { q: "자바에서 한 줄 주석을 작성할 때 사용하는 기호는?", a: "//", r: "한 줄 주석 기호입니다." },
            { q: "문자 하나를 저장하는 기본 자료형은?", a: "char", r: "문자 타입입니다." },

            // 3장: 제어문과 메서드
            { q: "for(int i=0; i<10; i++) 루프가 끝난 뒤 i의 값은?", a: "10", r: "p.120 07번" },
            { q: "switch 문에서 case 실행 후 밖으로 빠져나가는 키워드는?", a: "break", r: "p.121 10번" },
            { q: "반환할 값이 없을 때 리턴 타입으로 지정하는 키워드는?", a: "void", r: "p.123 06번" },
            { q: "이름은 같지만 매개변수가 다른 메서드를 여러 개 정의하는 것은?", a: "오버로딩", r: "p.123 07번" },
            { q: "반복 횟수가 정해져 있지 않을 때 유리한 제어문은?", a: "while", r: "p.124 08번" },
            { q: "조건이 참인 동안 '최소 한 번'은 실행을 보장하는 반복문은?", a: "do-while", r: "조건을 나중에 검사합니다." },
            { q: "반복문 내에서 다음 반복 회차로 즉시 건너뛰게 하는 키워드는?", a: "continue", r: "다음 루프로 넘어갑니다." },
            { q: "두 조건이 모두 참일 때만 true를 반환하는 논리 연산자는?", a: "&&", r: "AND 연산자입니다." },
            { q: "메서드 정의 시 외부로부터 받는 값을 저장하는 변수는?", a: "매개변수", r: "파라미터라고도 합니다." },
            { q: "메서드 실행 결과를 호출한 곳으로 돌려줄 때 쓰는 키워드는?", a: "return", r: "값을 반환합니다." },

            // 4장: 객체 지향
            { q: "new 연산자 뒤에 오며 객체 초기화를 담당하는 것은?", a: "생성자", r: "p.162 08번" },
            { q: "객체 내부에서 객체 자신을 가리키는 키워드는?", a: "this", r: "p.163 09번" },
            { q: "필드를 외부에서 숨기고 메서드로만 접근하게 하는 원칙은?", a: "캡슐화", r: "p.163 10번" },
            { q: "메서드 연속 호출(체이닝)이 가능하려면 무엇을 반환해야 하는가?", a: "this", r: "p.166 07번" },
            { q: "클래스로부터 생성된 실체를 무엇이라 하는가?", a: "객체", r: "또는 인스턴스라고 합니다." },
            { q: "모든 인스턴스가 공유하는 필드를 만들 때 쓰는 키워드는?", a: "static", r: "정적 멤버 선언 키워드입니다." },
            { q: "객체 생성 없이 '클래스명.메서드명'으로 부를 수 있는 메서드는?", a: "정적메서드", r: "static이 붙은 메서드입니다." },
            { q: "객체의 상태를 저장하는 클래스 내의 변수를 무엇이라 하는가?", a: "필드", r: "멤버 변수라고도 합니다." },
            { q: "접근 제어자 중 가장 제한적인(자신 클래스만 허용) 제어자는?", a: "private", r: "정보 은닉에 사용됩니다." },
            { q: "생성자가 하나도 없을 때 자바가 자동으로 만들어주는 것은?", a: "기본생성자", r: "매개변수 없는 생성자입니다." }
        ];

        let currentIdx = 0, score = 0, quizPool = [], userAnswers = [];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            currentIdx = 0; score = 0; userAnswers = [];
            // 전체 30문제 중 랜덤으로 10개만 추출 (중복 없음)
            quizPool = shuffle([...javaBank]).slice(0, 10);
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = quizPool[currentIdx];
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 10) * 100}%`;
            document.getElementById('progress-text').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 10`;
            document.getElementById('q-text').innerText = q.q;
            
            const area = document.getElementById('code-area');
            if(q.c) { area.innerText = q.c; area.classList.remove('hidden'); }
            else { area.classList.add('hidden'); }
            
            const input = document.getElementById('ans-input');
            input.value = "";
            setTimeout(() => input.focus(), 100);
        }

        function handleNext() {
            const input = document.getElementById('ans-input');
            const userAns = input.value.trim().toLowerCase().replace(/\s/g,"");
            const correct = quizPool[currentIdx].a.toLowerCase().replace(/\s/g,"");
            
            const isCorrect = userAns === correct;
            if(isCorrect) score++;
            
            userAnswers.push({ 
                q: quizPool[currentIdx].q, 
                u: input.value, 
                a: quizPool[currentIdx].a, 
                r: quizPool[currentIdx].r, 
                is: isCorrect, 
                c: quizPool[currentIdx].c 
            });

            if(currentIdx < 9) { 
                currentIdx++; 
                showQuestion(); 
            } else { 
                finish(); 
            }
        }

        function finish() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} / 10`;
            
            const list = document.getElementById('review-list');
            list.innerHTML = userAnswers.map((item, i) => `
                <div class="p-4 rounded-2xl border-2 ${item.is ? 'border-blue-50 bg-blue-50/30' : 'border-red-50 bg-red-50/30'} animate-in">
                    <p class="font-bold text-slate-800 mb-2 text-sm">${i+1}. ${item.q}</p>
                    ${item.c ? `<div class="bg-slate-900 text-white p-2 rounded text-[10px] mb-2 font-mono whitespace-pre">${item.c}</div>` : ''}
                    <div class="text-xs space-y-1">
                        <p class="${item.is ? 'text-blue-600' : 'text-red-600'} font-bold">내 답변: ${item.u || '(공백)'}</p>
                        <p class="text-slate-700">정답: <span class="font-bold underline">${item.a}</span></p>
                        <p class="text-slate-400 mt-2">💡 ${item.r}</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('ans-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleNext(); });
    </script>
</body>
</html>
